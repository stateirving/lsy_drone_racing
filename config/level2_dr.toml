# Level 2 domain-randomized training config
#
# This keeps the level2 nominal track layout fixed, but increases deploy-oriented robustness.
# Semantic differences from config/level2.toml are marked inline with "DR delta":
# - stronger horizontal force disturbance for airflow-like effects
# - slightly larger action noise
# - per-episode thrust scale and short-horizon battery sag for cf21B_500
# - wider mass randomization
# - wider diagonal inertia randomization

[controller]
file = "ppo_level2_inference.py"

[deploy]
check_race_track = true
check_drone_start_pos = true
real_track_objects = true

[[deploy.drones]]
id = 52
channel = 80
drone_model = "cf21B_500"

[train.thrust]
# Train-only DR: cf21B_500-like total thrust calibration and battery sag.
# Effective thrust multiplier starts in [0.94, 1.04] and can drop by up to 5% over 8s.
scale_min = 0.94
scale_max = 1.04
battery_sag_min = 0.0
battery_sag_max = 0.05
battery_sag_horizon_s = 8.0

[sim]
physics = "first_principles"
drone_model = "cf21B_500"
freq = 500
attitude_freq = 500
render = true
camera = -1
[[sim.cam_config]]
distance = 5.0
azimuth = 180.0
elevation = -25.0
lookat = [0.0, 0.0, 0.0]

[env]
id = "DroneRacing-v0"
seed = -1
freq = 50
sensor_range = 0.7
control_mode = "attitude"

[env.track]
# Keep level2 layout fixed. Do not enable full level3-style track generation here.
randomize = false

[[env.track.gates]]
pos = [0.5, 0.25, 0.7]
rpy = [0.0, 0.0, -0.78]
[[env.track.gates]]
pos = [1.05, 0.75, 1.2]
rpy = [0.0, 0.0, 2.35]
[[env.track.gates]]
pos = [-1.0, -0.25, 0.7]
rpy = [0.0, 0.0, 3.14]
[[env.track.gates]]
pos = [0.0, -0.75, 1.2]
rpy = [0.0, 0.0, 0.0]

[[env.track.obstacles]]
pos = [0.0, 0.75, 1.55]
[[env.track.obstacles]]
pos = [1.0, 0.25, 1.55]
[[env.track.obstacles]]
pos = [-1.5, -0.25, 1.55]
[[env.track.obstacles]]
pos = [-0.5, -0.75, 1.55]

[[env.track.drones]]
pos = [-1.5, 0.75, 0.01]
rpy = [0.0, 0.0, 0.0]
vel = [0, 0, 0]
ang_vel = [0, 0, 0]

[env.track.safety_limits]
pos_limit_low = [-2.5, -1.5, -1e-3]
pos_limit_high = [2.5, 1.5, 2.0]

[env.disturbances.action]
fn = "normal"
# DR delta vs level2.toml: action noise scale 0.001 -> 0.006.
scale = 0.006

[env.disturbances.dynamics]
fn = "uniform"
[env.disturbances.dynamics.kwargs]
# DR delta vs level2.toml: x/y disturbance range +/-0.1 -> +/-0.15; z stays +/-0.1.
minval = [-0.15, -0.15, -0.1]
maxval = [0.15, 0.15, 0.1]

[env.randomizations.drone_pos]
fn = "uniform"
[env.randomizations.drone_pos.kwargs]
minval = [-0.1, -0.1, 0.0]
maxval = [0.1, 0.1, 0.02]

[env.randomizations.drone_rpy]
fn = "uniform"
[env.randomizations.drone_rpy.kwargs]
minval = [-0.1, -0.1, -0.1]
maxval = [0.1, 0.1, 0.1]

[env.randomizations.drone_mass]
fn = "uniform"
[env.randomizations.drone_mass.kwargs]
# DR delta vs level2.toml: mass randomization +/-0.005 -> +/-0.01.
minval = -0.01
maxval = 0.01

[env.randomizations.drone_inertia]
fn = "uniform"
[env.randomizations.drone_inertia.kwargs]
# DR delta vs level2.toml: inertia randomization +/-1e-6 -> +/-2e-6.
minval = [-0.000002, -0.000002, -0.000002]
maxval = [0.000002, 0.000002, 0.000002]

[env.randomizations.gate_pos]
fn = "uniform"
[env.randomizations.gate_pos.kwargs]
minval = [-0.15, -0.15, -0.1]
maxval = [0.15, 0.15, 0.1]

[env.randomizations.gate_rpy]
fn = "uniform"
[env.randomizations.gate_rpy.kwargs]
minval = [-0.05, -0.1, -0.2]
maxval = [0.05, 0.1, 0.2]

[env.randomizations.obstacle_pos]
fn = "uniform"
[env.randomizations.obstacle_pos.kwargs]
minval = [-0.15, -0.15, -0.05]
maxval = [0.15, 0.15, 0.05]
